<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent — Zee Pearson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=IBM+Plex+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111010;
      --bg2: #1a1918;
      --fg: #f0ece6;
      --fg2: #a09890;
      --fg3: #555;
      --accent: oklch(42% 0.13 240);
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Inter', sans-serif;
      --serif: 'Playfair Display', serif;
      --max: 1120px;
      --nav-h: 64px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: #050c18;
      color: var(--fg);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
    }

    .page-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .page-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    .page-bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(3,8,20,0.92) 0%, rgba(3,8,20,0.80) 50%, rgba(3,8,20,0.88) 100%);
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      background: rgba(5,12,24,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(91,200,255,0.1);
    }
    .nav-logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-logo:hover { color: #5bc8ff; }
    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(210,230,255,0.7);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #5bc8ff; }

    .page-content {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: calc(var(--nav-h) + 48px) 24px 80px;
      text-align: center;
    }

    .check-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(91,200,255,0.1);
      border: 2px solid rgba(91,200,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    .check-icon svg {
      width: 32px;
      height: 32px;
      stroke: #5bc8ff;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .thank-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #5bc8ff;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.6s 0.2s forwards;
    }
    .thank-title {
      font-family: var(--serif);
      font-size: clamp(36px, 5vw, 60px);
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #ffffff;
      text-shadow: 0 4px 32px rgba(0,0,0,0.9);
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.6s 0.3s forwards;
    }
    .thank-title em { font-style: italic; color: #f0a030; }
    .thank-sub {
      font-size: 15px;
      color: rgba(210,230,255,0.65);
      font-weight: 300;
      max-width: 400px;
      margin: 0 auto 40px;
      opacity: 0;
      animation: fadeUp 0.6s 0.4s forwards;
    }

    .btn-group {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.6s 0.5s forwards;
    }
    .btn-primary {
      padding: 13px 32px;
      background: var(--accent);
      color: #fff;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
      display: inline-block;
    }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-secondary {
      padding: 13px 32px;
      background: transparent;
      color: rgba(255,255,255,0.85);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1.5px solid currentColor;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s, transform 0.15s;
      display: inline-block;
    }
    .btn-secondary:hover { color: #5bc8ff; border-color: #5bc8ff; transform: translateY(-1px); }

    footer {
      position: relative;
      z-index: 1;
      background: rgba(5,12,24,0.7);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(91,200,255,0.1);
      padding: 32px 48px;
    }
    .footer-inner {
      max-width: var(--max);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-name {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      color: rgba(210,230,255,0.5);
    }
    .footer-links {
      display: flex;
      gap: 24px;
    }
    .footer-links a {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: rgba(160,152,144,0.7);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: #5bc8ff; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 640px) {
      nav { padding: 0 20px; }
      .nav-links { gap: 20px; }
      footer { padding: 24px 20px; }
      .footer-inner { flex-direction: column; gap: 12px; text-align: center; }
    }
  </style>
</head>
<body>

  <div class="page-bg">
    <img src="img/circuit-bg.png" alt="" />
    <div class="page-bg-overlay"></div>
  </div>

  <nav>
    <a class="nav-logo" href="index.html">ZP</a>
    <ul class="nav-links">
      <li><a href="index.html#skills">Skills</a></li>
      <li><a href="index.html#projects">Projects</a></li>
      <li><a href="index.html#education">Education</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="page-content">
    <div class="check-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="thank-label">Message Received</div>
    <h1 class="thank-title">Thank <em>You!</em></h1>
    <p class="thank-sub">Your message has been sent. I'll get back to you as soon as possible.</p>
    <div class="btn-group">
      <a class="btn-primary" href="index.html">Back to Portfolio</a>
      <a class="btn-secondary" href="contact.html">Send Another Message</a>
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-name">Zee Pearson — Embedded Software Engineer</div>
      <div class="footer-links">
        <a href="https://www.linkedin.com/in/zee-p-8a0a72259/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://github.com/zeepearson" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </footer>

</body>
</html>
