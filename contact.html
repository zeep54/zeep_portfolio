<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Zee Pearson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=IBM+Plex+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111010;
      --bg2: #1a1918;
      --fg: #f0ece6;
      --fg2: #a09890;
      --fg3: #555;
      --accent: oklch(42% 0.13 240);
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Inter', sans-serif;
      --serif: 'Playfair Display', serif;
      --max: 1120px;
      --nav-h: 64px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: #050c18;
      color: var(--fg);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* CIRCUIT BACKGROUND — fixed behind everything */
    .page-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .page-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    .page-bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(3,8,20,0.92) 0%,
        rgba(3,8,20,0.80) 50%,
        rgba(3,8,20,0.88) 100%
      );
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      background: transparent;
      transition: background 0.4s, border-bottom 0.4s;
    }
    nav.scrolled {
      background: rgba(5,12,24,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(91,200,255,0.1);
    }
    .nav-logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s, transform 0.15s;
      display: inline-block;
    }
    .nav-logo:hover { color: #5bc8ff; transform: translateY(-1px); }
    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(210,230,255,0.7);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: #5bc8ff; }
    .nav-hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      color: rgba(210,230,255,0.7);
    }
    .nav-hamburger svg {
      display: block;
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
    }

    /* PAGE CONTENT */
    .page-content {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: calc(var(--nav-h) + 48px) 24px 80px;
    }

    /* HEADER */
    .contact-header {
      text-align: center;
      margin-bottom: 52px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.8s 0.2s forwards;
    }
    .contact-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #5bc8ff;
      margin-bottom: 14px;
    }
    .contact-title {
      font-family: var(--serif);
      font-size: clamp(40px, 5vw, 68px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: #ffffff;
      text-shadow: 0 4px 32px rgba(0,0,0,0.9), 0 0 60px rgba(91,200,255,0.1);
    }
    .contact-title em {
      font-style: italic;
      color: #f0a030;
    }
    .contact-subtitle {
      margin-top: 16px;
      font-size: 15px;
      color: rgba(210,230,255,0.65);
      font-weight: 300;
      max-width: 440px;
      margin-left: auto;
      margin-right: auto;
    }

    /* FORM CARD */
    .form-card {
      width: 100%;
      max-width: 560px;
      background: rgba(5,12,24,0.45);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(91,200,255,0.18);
      padding: 48px 44px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s 0.4s forwards;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(91,200,255,0.8);
      margin-bottom: 8px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      background: transparent;
      border: 1px solid rgba(91,200,255,0.25);
      color: rgba(240,236,230,0.95);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 300;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.25s, background 0.25s;
      -webkit-appearance: none;
    }
    .form-group input:focus-visible,
    .form-group textarea:focus-visible {
      outline: 2px solid rgba(91,200,255,0.7);
      outline-offset: 2px;
    }
    .btn-submit:focus-visible { outline: 2px solid #fff; outline-offset: 3px; }
    .nav-logo:focus-visible,
    .nav-hamburger:focus-visible { outline: 2px solid #5bc8ff; outline-offset: 3px; }
    .nav-links a:focus-visible { outline: 2px solid #5bc8ff; outline-offset: 3px; }
    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(160,152,144,0.45);
      font-style: italic;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: rgba(91,200,255,0.65);
      background: rgba(91,200,255,0.04);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 130px;
    }
    /* autofill style override */
    .form-group input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px rgba(5,12,24,0.6) inset;
      -webkit-text-fill-color: rgba(240,236,230,0.95);
      transition: background-color 5000s ease-in-out 0s;
    }

    .btn-submit {
      width: 100%;
      padding: 14px 32px;
      background: var(--accent);
      color: #fff;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 4px;
    }
    .btn-submit:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* STATUS MESSAGES */
    .form-status {
      display: none;
      text-align: center;
      padding: 14px;
      margin-top: 16px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
    }
    .form-status.success {
      display: block;
      color: #5bc8ff;
      border: 1px solid rgba(91,200,255,0.3);
      background: rgba(91,200,255,0.06);
    }
    .form-status.error {
      display: block;
      color: #ff8080;
      border: 1px solid rgba(255,128,128,0.3);
      background: rgba(255,128,128,0.06);
    }

    /* SCROLL TO TOP */
    .scroll-top {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 44px;
      height: 44px;
      background: rgba(5,12,24,0.7);
      backdrop-filter: blur(8px);
      border: 1.5px solid rgba(91,200,255,0.4);
      color: #5bc8ff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.2s, border-color 0.2s, background 0.2s;
      z-index: 200;
    }
    .scroll-top.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .scroll-top:hover {
      background: rgba(91,200,255,0.12);
      border-color: #5bc8ff;
      transform: translateY(-3px);
    }
    .scroll-top svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* FOOTER */
    footer {
      position: relative;
      z-index: 1;
      background: rgba(5,12,24,0.7);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(91,200,255,0.1);
      padding: 32px 48px;
    }
    .footer-inner {
      max-width: var(--max);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-name {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      color: rgba(210,230,255,0.5);
    }
    .footer-links {
      display: flex;
      gap: 24px;
    }
    .footer-links a {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: rgba(160,152,144,0.7);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: #5bc8ff; }

    @keyframes fadeUp {
      to { opacity: 1; transform: none; }
    }

    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
      .form-card { padding: 28px 20px; }
    }

    @media (max-width: 640px) {
      nav { padding: 0 20px; }
      .nav-hamburger { display: block; }
      .nav-links {
        display: none;
        position: absolute;
        top: var(--nav-h);
        left: 0; right: 0;
        background: rgba(5,12,24,0.97);
        backdrop-filter: blur(12px);
        flex-direction: column;
        gap: 0;
        padding: 12px 0 20px;
        border-bottom: 1px solid rgba(91,200,255,0.1);
        list-style: none;
      }
      .nav-links.open { display: flex; }
      .nav-links li a { display: block; padding: 14px 24px; font-size: 13px; }
      .form-card { padding: 32px 24px; }
      .form-row { grid-template-columns: 1fr; }
      .footer-inner { flex-direction: column; gap: 12px; text-align: center; }
      .scroll-top { bottom: 20px; right: 20px; }
    }
  </style>
</head>
<body>

  <!-- CIRCUIT BACKGROUND -->
  <div class="page-bg">
    <img src="img/circuit-bg.png" alt="" />
    <div class="page-bg-overlay"></div>
  </div>

  <!-- NAV -->
  <nav id="nav">
    <a class="nav-logo" href="index.html">ZP</a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html#skills">Skills</a></li>
      <li><a href="index.html#projects">Projects</a></li>
      <li><a href="index.html#education">Education</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle menu" aria-expanded="false">
      <svg viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg">
        <line x1="2" y1="6" x2="20" y2="6"/>
        <line x1="2" y1="11" x2="20" y2="11"/>
        <line x1="2" y1="16" x2="20" y2="16"/>
      </svg>
    </button>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="page-content">
    <div class="contact-header">
      <div class="contact-label">Get In Touch</div>
      <h1 class="contact-title">Let's <em>Connect</em></h1>
      <p class="contact-subtitle">Have a question or opportunity? Send a message and I'll get back to you.</p>
    </div>

    <div class="form-card">
      <!--
        SETUP: Replace "YOUR_FORM_ID" below with your Formspree form ID.
        1. Go to https://formspree.io and sign up (free)
        2. Create a new form — set the email to zeepearson412@gmail.com
        3. Copy the form ID (looks like "abcd1234") and replace YOUR_FORM_ID
      -->
      <form id="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST" novalidate>
        <input type="hidden" name="_subject" value="New message from portfolio contact form" />

        <div class="form-row">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required />
          </div>
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" placeholder="What's this about?" />
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Your message..." required></textarea>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">Send Message</button>
        <div class="form-status" id="form-status"></div>
      </form>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <div class="footer-name">Zee Pearson — Embedded Software Engineer</div>
      <div class="footer-links">
        <a href="https://www.linkedin.com/in/zee-p-8a0a72259/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://github.com/zeepearson" target="_blank" rel="noopener">GitHub</a>
        <a href="index.html">Back to Portfolio</a>
      </div>
    </div>
  </footer>

  <!-- SCROLL TO TOP -->
  <button class="scroll-top" id="scroll-top" aria-label="Scroll to top">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>

  <script>
    // Nav scroll effect
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    });

    // Hamburger menu
    const hamburger = document.getElementById('nav-hamburger');
    const navLinks = document.getElementById('nav-links');
    hamburger.addEventListener('click', () => {
      const open = navLinks.classList.toggle('open');
      hamburger.setAttribute('aria-expanded', open);
    });

    // Scroll to top button
    const scrollTopBtn = document.getElementById('scroll-top');
    window.addEventListener('scroll', () => {
      scrollTopBtn.classList.toggle('visible', window.scrollY > 200);
    });
    scrollTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Contact form — AJAX submission via Formspree
    const form = document.getElementById('contact-form');
    const submitBtn = document.getElementById('submit-btn');
    const statusEl = document.getElementById('form-status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Basic validation
      const name = form.name.value.trim();
      const email = form.email.value.trim();
      const message = form.message.value.trim();
      if (!name || !email || !message) {
        statusEl.className = 'form-status error';
        statusEl.textContent = 'Please fill in your name, email, and message.';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      statusEl.className = 'form-status';

      try {
        const response = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          statusEl.className = 'form-status success';
          statusEl.textContent = 'Message sent! I\'ll get back to you soon.';
          form.reset();
        } else {
          const data = await response.json();
          const msg = data.errors ? data.errors.map(e => e.message).join(', ') : 'Something went wrong.';
          statusEl.className = 'form-status error';
          statusEl.textContent = msg;
        }
      } catch {
        statusEl.className = 'form-status error';
        statusEl.textContent = 'Network error — please try again.';
      }

      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Message';
    });
  </script>

</body>
</html>
